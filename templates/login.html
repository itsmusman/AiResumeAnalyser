{% extends "base.html" %} {% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p>Login to AI Career Copilot</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="auth-form">
      <label>
        Email
        <input
          type="email"
          name="email"
          required
          placeholder="you@example.com"
        />
      </label>
      <label>
        Password
        <input
          type="password"
          name="password"
          required
          placeholder="••••••••"
        />
      </label>
      <button type="submit" class="primary-button">Login</button>
    </form>

    <div class="auth-footer">
      <span
        >Don't have an account?
        <a href="{{ url_for('signup') }}">Sign up</a></span
      >
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
    </div>
  </div>
</div>
{% endblock %}
